<h1>Lançamentos</h1>

<table border="1">
    <tr>
        <th>Produto</th>
        <th>Fornecedor</th>
        <th>Tipo de Custo</th>
        <th>Conta de Origem</th>
        <th>Forma de Pag</th>
        <th>Valor</th>
        <th>Status</th>
        <th>Ações</th>
    </tr>

    {% for l in lancamentos %}
    <tr>
        <td>{{ l.produto.nome }}</td>
        <td>{{ l.fornecedor.nome }}</td>
        <td>{{ l.tipo_custo }}</td>
        <td>{{ l.conta_origem }}</td>
        <td>{{ l.forma_pagamento }}</td>
        <td>{{ l.status }}</td>
        <td>{{ l.valor }}</td>
        <td>
            <a href="{{ url_for('editar_lancamento', id=l.id) }}">Editar</a>

            <form action="{{ url_for('deletar_lancamento', id=l.id) }}" method="POST" style="display:inline;">
                <button type="submit">Deletar</button>
            </form>
        </td>
    </tr>
    {% endfor %}
</table>

<a href="{{ url_for('homepage') }}">Home</a>
<a href="{{ url_for('novo_lancamento') }}">Novo lançamento</a>
